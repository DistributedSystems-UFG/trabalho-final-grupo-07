# nginx.conf — EC2-Gateway
# Load balancer interno entre Gateway e as duas instâncias do Game Service
#
# ⚠ SUBSTITUIR antes de usar:
#   <IP_PRIVADO_EC2_GAMESERVICE_1>  → IP privado da EC2-GameService-1
#   <IP_PRIVADO_EC2_GAMESERVICE_2>  → IP privado da EC2-GameService-2
#
# Exemplo rápido via sed (execute da raiz do repositório):
#   sed -i 's/<IP_PRIVADO_EC2_GAMESERVICE_1>/10.0.1.10/g' nginx.conf
#   sed -i 's/<IP_PRIVADO_EC2_GAMESERVICE_2>/10.0.1.11/g' nginx.conf
#
# Fluxo:
#   Gateway → nginx:9090 (gRPC)        → ip_hash → GameService-1 ou GameService-2
#   Gateway → nginx:8080 (WebSocket)   → ip_hash → GameService-1 ou GameService-2
#
# Nota sobre ip_hash neste contexto:
#   O único cliente do Nginx é o próprio container Gateway (mesmo IP).
#   O ip_hash garante que todas as conexões de uma mesma origem vão para o
#   mesmo backend — comportamento de sticky session.
#   Conexões WebSocket são persistentes por natureza (long-lived), portanto
#   uma vez estabelecidas, permanecem no mesmo backend independentemente do
#   algoritmo de balanceamento.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {

    # ── Upstream: gRPC (Game Service porta 9090) ──────────────────────────────
    upstream game_grpc_upstream {
        ip_hash;
        server <IP_PRIVADO_EC2_GAMESERVICE_1>:9090;
        server <IP_PRIVADO_EC2_GAMESERVICE_2>:9090;
        keepalive 32;
    }

    # ── Upstream: WebSocket / STOMP (Game Service porta 8080) ─────────────────
    upstream game_ws_upstream {
        ip_hash;
        server <IP_PRIVADO_EC2_GAMESERVICE_1>:8080;
        server <IP_PRIVADO_EC2_GAMESERVICE_2>:8080;
    }

    # ── Servidor gRPC (HTTP/2 cleartext — h2c) ────────────────────────────────
    server {
        listen 9090 http2;

        location / {
            grpc_pass grpc://game_grpc_upstream;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;

            # Timeouts generosos para streams gRPC de longa duração
            grpc_connect_timeout 10s;
            grpc_read_timeout    300s;
            grpc_send_timeout    300s;
        }
    }

    # ── Servidor WebSocket / HTTP ─────────────────────────────────────────────
    server {
        listen 8080;

        # Endpoint WebSocket/STOMP — upgrade obrigatório
        location /ws {
            proxy_pass         http://game_ws_upstream;
            proxy_http_version 1.1;

            # Headers de upgrade para WebSocket
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeout longo — conexões WebSocket de jogo podem durar minutos
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Demais rotas HTTP do Game Service
        location / {
            proxy_pass         http://game_ws_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        }
    }
}
