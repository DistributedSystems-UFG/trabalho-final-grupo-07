grpc:
  port: 9090

spring:
  datasource:
    primary:
      url: jdbc:postgresql://${DB_USER_PRIMARY_HOST:localhost}:${DB_USER_PRIMARY_PORT:5432}/${DB_USER_NAME:postgres}
      username: ${DB_USER_PRIMARY_USER:postgres}
      password: ${DB_USER_PRIMARY_PASS:123}
    replica:
      url: jdbc:postgresql://${DB_USER_REPLICA_HOST:localhost}:${DB_USER_REPLICA_PORT:5432}/${DB_USER_NAME:postgres}
      username: ${DB_USER_REPLICA_USER:postgres}
      password: ${DB_USER_REPLICA_PASS:123}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: user-service-group

bcrypt:
  strength: ${BCRYPT_STRENGTH:10}

logging:
  level:
    org.springframework.boot.context.properties: DEBUG