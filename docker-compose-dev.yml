# docker-compose-dev.yml
# Sobe toda a aplicação localmente — infraestrutura + serviços + frontend
# Uso: docker compose -f docker-compose-dev.yml up -d --build

services:

  # ─── Infraestrutura ───────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: trivia-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trivia-net

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: trivia-redis-commander
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8091:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    networks:
      - trivia-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: trivia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trivia-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: trivia-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - trivia-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: trivia-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: trivia-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - trivia-net

  db-shard-a:
    image: postgres:15-alpine
    container_name: trivia-db-shard-a
    environment:
      POSTGRES_DB: ${DB_SHARD_A_NAME}
      POSTGRES_USER: ${DB_SHARD_A_USER}
      POSTGRES_PASSWORD: ${DB_SHARD_A_PASS}
    ports:
      - "5432:5432"
    volumes:
      - ./infra/init/shard-a:/docker-entrypoint-initdb.d
      - db-shard-a-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SHARD_A_USER} -d ${DB_SHARD_A_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trivia-net

  db-shard-b:
    image: postgres:15-alpine
    container_name: trivia-db-shard-b
    environment:
      POSTGRES_DB: ${DB_SHARD_B_NAME}
      POSTGRES_USER: ${DB_SHARD_B_USER}
      POSTGRES_PASSWORD: ${DB_SHARD_B_PASS}
    ports:
      - "5433:5432"
    volumes:
      - ./infra/init/shard-b:/docker-entrypoint-initdb.d
      - db-shard-b-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SHARD_B_USER} -d ${DB_SHARD_B_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trivia-net

  db-user-primary:
    image: postgres:15-alpine
    container_name: trivia-db-user-primary
    environment:
      POSTGRES_DB: ${DB_USERDB_NAME}
      POSTGRES_USER: ${DB_USERDB_USER}
      POSTGRES_PASSWORD: ${DB_USERDB_PASS}
    ports:
      - "5434:5432"
    volumes:
      - ./infra/init/userdb:/docker-entrypoint-initdb.d
      - db-user-primary-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERDB_USER} -d ${DB_USERDB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trivia-net

  db-user-replica:
    image: postgres:15-alpine
    container_name: trivia-db-user-replica
    environment:
      POSTGRES_DB: ${DB_USERDB_NAME}
      POSTGRES_USER: ${DB_USERDB_USER}
      POSTGRES_PASSWORD: ${DB_USERDB_PASS}
    ports:
      - "5435:5432"
    volumes:
      - ./infra/init/userdb:/docker-entrypoint-initdb.d
      - db-user-replica-data:/var/lib/postgresql/data
    depends_on:
      db-user-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERDB_USER} -d ${DB_USERDB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trivia-net

  # ─── Serviços de aplicação ────────────────────────────────────────────────────

  game-service:
    build:
      context: ./game-service/trivia-game-service
    container_name: trivia-game-service
    ports:
      - "8080:8080"
      - "9090:9090"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-shard-a:
        condition: service_healthy
      db-shard-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat /dev/null > /dev/tcp/localhost/9090' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - trivia-net

  user-service:
    build:
      context: ./user-service
    container_name: trivia-user-service
    ports:
      - "9091:9091"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      db-user-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat /dev/null > /dev/tcp/localhost/9091' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - trivia-net

  gateway:
    build:
      context: ./apigateway
    container_name: trivia-gateway
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      game-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat /dev/null > /dev/tcp/localhost/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trivia-net

  frontend:
    build:
      context: ./front-end
      args:
        VITE_API_GATEWAY_HOST: ${VITE_API_GATEWAY_HOST}
    container_name: trivia-frontend
    ports:
      - "80:80"

networks:
  trivia-net:
    driver: bridge

volumes:
  db-shard-a-data:
  db-shard-b-data:
  db-user-primary-data:
  db-user-replica-data: